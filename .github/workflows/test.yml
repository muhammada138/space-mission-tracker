name: Run Tests

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        cd backend
        iconv -f UTF-16LE -t UTF-8 requirements.txt > reqs_utf8.txt
        pip install -r reqs_utf8.txt
    - name: Run Tests
      run: |
        cd backend
        python -m pytest
